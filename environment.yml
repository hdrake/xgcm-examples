# Conda environment for running the xgcm example notebooks.
#
#   mamba env create -f environment.yml
#   conda activate xgcm-examples
#
name: xgcm-examples
channels:
  - conda-forge
dependencies:
  - python=3.12
  - xgcm>=0.10.0  # v0.10.0 renamed `boundary`->`padding` and removed `periodic`
  - xarray
  - dask
  - numba
  - numpy
  - scipy
  - netcdf4
  - zarr
  - gcsfs
  - matplotlib-base
  - cartopy
  - pyresample
  - jupyter
  - nbconvert
  - ipykernel
